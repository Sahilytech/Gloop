<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gloop: Ultra Pro Max</title>
    <script src="https://integration.gamepix.com/sdk/v3/gamepix.sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg: #FCFCFA; --card: #FFFFFF; --txt: #2D3436; --shadow: rgba(0,0,0,0.08);
            --p: #FFB7C5; --p-dark: #E8AAB5; --accent: #FFB7C5;
        }

        /* Normalizar colores en pantallas wide-gamut (P3). Reduce ligeramente saturación/contraste
           para que los colores se asemejen más a sRGB en dispositivos móviles con pantallas P3. */
        @supports (color: color(display-p3 1 0 0)) {
            html, body {
                -webkit-filter: saturate(0.92) contrast(0.98);
                filter: saturate(0.92) contrast(0.98);
            }
            canvas { image-rendering: auto; }
        }

        @media (color-gamut: p3) {
            html, body {
                -webkit-filter: saturate(0.92) contrast(0.98);
                filter: saturate(0.92) contrast(0.98);
            }
        }

        /* Temas Dinámicos */
        [data-theme="light-pink"] { --bg: #FFF0F3; --p: #FF8FA3; --p-dark: #FF4D6D; }
        [data-theme="light-blue"] { --bg: #E0F2FE; --p: #38BDF8; --p-dark: #0284C7; }
        [data-theme="light-violet"] { --bg: #F5F3FF; --p: #A78BFA; --p-dark: #7C3AED; }
        [data-theme="light-yellow"] { --bg: #FEFCE8; --p: #FACC15; --p-dark: #CA8A04; }
        [data-theme="light-green"] { --bg: #F0FDF4; --p: #4ADE80; --p-dark: #16A34A; }

        [data-theme^="dark"] { --bg: #121212; --card: #1E1E1E; --txt: #F0F0F0; --shadow: rgba(0,0,0,0.6); }
        [data-theme="dark-pink"] { --p: #FF4D6D; --p-dark: #A4133C; }
        [data-theme="dark-blue"] { --p: #0EA5E9; --p-dark: #0369A1; }
        [data-theme="dark-violet"] { --p: #8B5CF6; --p-dark: #5B21B6; }
        [data-theme="dark-yellow"] { --p: #EAB308; --p-dark: #A16207; }
        [data-theme="dark-green"] { --p: #22C55E; --p-dark: #15803D; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            font-family: 'Outfit', sans-serif; overflow: hidden; 
            touch-action: none; color: var(--txt); transition: background 0.4s ease;
        }

        .screen { 
            position: absolute; inset: 0; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; z-index: 1000; background: var(--bg);
        }
        .screen.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn { 
            background: var(--card); border: none; padding: 16px; border-radius: 20px; 
            font-weight: 900; font-size: 1.1rem; color: var(--txt); cursor: pointer; 
            box-shadow: 0 6px 0 var(--shadow); transition: all 0.1s ease; 
            width: 100%; max-width: 280px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--shadow); }
        .btn-p { background: var(--p); color: white; box-shadow: 0 6px 0 var(--p-dark); }

        #hud { 
            position: absolute; top: 0; width: 100%; padding: 20px; 
            display: none; justify-content: space-between; z-index: 500; pointer-events: none; 
        }
        .pill { 
            background: var(--card); padding: 8px 16px; border-radius: 50px; 
            font-weight: 900; pointer-events: auto; box-shadow: 0 4px 15px var(--shadow);
            display: flex; align-items: center; gap: 8px; border: 2px solid var(--p);
        }

        /* Slider de Volumen Adaptado al Tema */
        .slider-container { width: 100%; max-width: 260px; margin: 15px 0; }
        input[type=range] { -webkit-appearance: none; -moz-appearance: none; appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 10px; background: var(--shadow); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; -moz-appearance: none; appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: var(--p); cursor: pointer; margin-top: -7px; 
            border: 3px solid var(--card); box-shadow: 0 2px 6px var(--p-dark);
        }
        /* Firefox slider styles */
        input[type=range]::-moz-range-track { height: 10px; background: var(--shadow); border-radius: 10px; }
        input[type=range]::-moz-range-thumb { height: 24px; width: 24px; border-radius: 50%; background: var(--p); border: 3px solid var(--card); box-shadow: 0 2px 6px var(--p-dark); }

        /* Shop Corregida */
        /* Forzar tamaño fijo del menú de tienda */
        #scr-shop .shop-container { width: 800px; height: 450px; max-width: none; max-height: none; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; margin-bottom: 15px; border-radius: 20px; background: var(--shadow); scrollbar-width: none; touch-action: pan-y; }
        /* Más columnas para aprovechar 800px */
        #scr-shop .shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .skin-item { background: var(--card); padding: 15px 5px; border-radius: 18px; cursor: pointer; border: 4px solid transparent; text-align: center; transition: transform 240ms cubic-bezier(.2,.9,.2,1), box-shadow 240ms, opacity 200ms; will-change: transform, opacity, box-shadow; }
        .skin-item.selected { border-color: var(--p); transform: scale(1.05); box-shadow: 0 0 15px var(--p); }
        /* Animación de entrada para items */
        .skin-item.anim-init { transform: translateY(12px) scale(0.98); opacity: 0; }
        .skin-item.anim-show { transform: translateY(0) scale(1); opacity: 1; }
        .skin-item.locked { opacity: 0.8; }

        /* Sub-menús de Temas */
        .theme-group { display: none; width: 100%; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 10px; }
        .theme-group.active { display: flex; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid var(--card); box-shadow: 0 2px 5px var(--shadow); }

        canvas { display: block; position: absolute; inset: 0; z-index: 1; }
        .lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; max-width: 280px; }
        .lang-btn { padding: 8px; background: var(--card); border-radius: 10px; font-size: 0.7rem; font-weight: 900; cursor: pointer; border: 2px solid transparent; }
        .lang-btn.active { border-color: var(--p); background: var(--p); color: white; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="pill">⭐ <span id="val-stars">0</span></div>
        <div class="pill" id="val-score">0</div>
        <div class="pill" style="cursor:pointer; color: #FF7675" onclick="game.stop()">✕</div>
    </div>

    <div id="scr-main" class="screen active">
        <h1 style="font-size: 4.2rem; letter-spacing: -3px; line-height: 0.8;">GLOOP</h1>
        <p style="margin-bottom: 30px; font-weight: 900; color: var(--p);">ULTRA PRO MAX</p>
        <button class="btn btn-p" onclick="ui.go('scr-modes')" id="txt-play">PLAY</button>
        <button class="btn" onclick="ui.go('scr-shop')" id="txt-shop-btn">COLLECTION</button>
        <button class="btn" onclick="ui.go('scr-settings')" id="txt-settings-btn">SETTINGS</button>
    </div>

    <div id="scr-modes" class="screen">
        <h2 id="txt-modes-title" style="margin-bottom: 20px;">MODES</h2>
        <button class="btn" onclick="game.start('classic')" id="txt-mode-classic">CHROMA</button>
        <button class="btn" onclick="game.start('zen')" id="txt-mode-zen" style="color: #38BDF8">ZEN</button>
        <button class="btn" onclick="game.start('chaos')" id="txt-mode-chaos" style="color: #FACC15">CHAOS</button>
        <button class="btn" onclick="game.start('giant')" id="txt-mode-giant" style="color: #4ADE80">GIANT</button>
        <button class="btn" onclick="game.start('void')" id="txt-mode-void" style="background: #2D3436; color: white;">VOID</button>
        <button class="btn" onclick="ui.go('scr-main')" id="txt-back-1" style="font-size: 0.8rem; opacity: 0.5;">BACK</button>
    </div>

    <div id="scr-settings" class="screen">
        <h2 id="txt-settings-title" style="margin-bottom: 15px;">SETTINGS</h2>
        
        <div class="slider-container">
            <h3 id="txt-vol-label" style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">AUDIO VOLUME</h3>
            <input type="range" id="vol-slider" min="0" max="1" step="0.1" oninput="audio.update(this.value)">
        </div>

        <button class="btn" onclick="ui.toggleSub('sub-light')" id="txt-theme-light">LIGHT THEMES</button>
        <div id="sub-light" class="theme-group">
            <div class="color-grid">
                <div class="color-dot" style="background:#FF8FA3" onclick="ui.setTheme('light-pink')"></div>
                <div class="color-dot" style="background:#38BDF8" onclick="ui.setTheme('light-blue')"></div>
                <div class="color-dot" style="background:#A78BFA" onclick="ui.setTheme('light-violet')"></div>
                <div class="color-dot" style="background:#FACC15" onclick="ui.setTheme('light-yellow')"></div>
                <div class="color-dot" style="background:#4ADE80" onclick="ui.setTheme('light-green')"></div>
            </div>
        </div>

        <button class="btn" onclick="ui.toggleSub('sub-dark')" id="txt-theme-dark">DARK THEMES</button>
        <div id="sub-dark" class="theme-group">
            <div class="color-grid">
                <div class="color-dot" style="background:#FF4D6D" onclick="ui.setTheme('dark-pink')"></div>
                <div class="color-dot" style="background:#0EA5E9" onclick="ui.setTheme('dark-blue')"></div>
                <div class="color-dot" style="background:#8B5CF6" onclick="ui.setTheme('dark-violet')"></div>
                <div class="color-dot" style="background:#EAB308" onclick="ui.setTheme('dark-yellow')"></div>
                <div class="color-dot" style="background:#22C55E" onclick="ui.setTheme('dark-green')"></div>
            </div>
        </div>

        <h3 id="txt-lang-label" style="font-size: 0.7rem; opacity: 0.6; margin-top: 10px;">LANGUAGE</h3>
        <div class="lang-grid">
            <div class="lang-btn" onclick="ui.setLang('en')">EN</div>
            <div class="lang-btn" onclick="ui.setLang('es')">ES</div>
            <div class="lang-btn" onclick="ui.setLang('pt')">PT</div>
            <div class="lang-btn" onclick="ui.setLang('ru')">RU</div>
            <div class="lang-btn" onclick="ui.setLang('jp')">JP</div>
        </div>

        <button class="btn btn-p" onclick="ui.go('scr-main')" style="margin-top: 20px;" id="txt-save-btn">SAVE</button>
    </div>

    <div id="scr-shop" class="screen">
        <h2 id="txt-shop-title">COLLECTION</h2>
        <div class="pill" style="margin: 10px 0;">⭐ <span id="shop-stars">0</span></div>
        <div class="shop-container"><div class="shop-grid" id="shop-grid"></div></div>
        <button class="btn" onclick="ui.go('scr-main')" id="txt-back-2">BACK</button>
    </div>

    <canvas id="stage"></canvas>

<script>
const audio = {
    bgm: new Audio('99.mp3'),
    init() {
        this.bgm.loop = true;
        this.bgm.volume = parseFloat(localStorage.getItem('g_vol') || 0.5);
        document.getElementById('vol-slider').value = this.bgm.volume;
        const playOnce = () => { this.bgm.play().catch(()=>{}); window.removeEventListener('touchstart', playOnce); };
        window.addEventListener('touchstart', playOnce);
    },
    update(v) { this.bgm.volume = v; localStorage.setItem('g_vol', v); },
    pause() { this.bgm.pause(); },
    resume() { this.bgm.play().catch(()=>{}); }
};

const TRANSLATIONS = {
    en: { play: "PLAY", shop: "COLLECTION", settings: "SETTINGS", modes: "MODES", back: "BACK", save: "SAVE", vol: "VOLUME", lang: "LANGUAGE", l_theme: "LIGHT", d_theme: "DARK", m_classic: "CHROMA", m_zen: "ZEN", m_chaos: "CHAOS", m_giant: "GIANT", m_void: "VOID" },
    es: { play: "JUGAR", shop: "COLECCIÓN", settings: "AJUSTES", modes: "MODOS", back: "VOLVER", save: "ACEPTAR", vol: "VOLUMEN", lang: "IDIOMA", l_theme: "TEMAS CLAROS", d_theme: "TEMAS OSCUROS", m_classic: "CHROMA", m_zen: "ZEN", m_chaos: "CAOS", m_giant: "GIGANTE", m_void: "VACÍO" },
    pt: { play: "JOGAR", shop: "COLEÇÃO", settings: "AJUSTES", modes: "MODOS", back: "VOLTAR", save: "SALVAR", vol: "VOLUME", lang: "IDIOMA", l_theme: "CLARO", d_theme: "ESCURO", m_classic: "CHROMA", m_zen: "ZEN", m_chaos: "CAOS", m_giant: "GIGANTE", m_void: "VAZIO" },
    ru: { play: "ИГРАТЬ", shop: "КОЛЛЕКЦИЯ", settings: "НАСТРОЙКИ", modes: "РЕЖИМЫ", back: "НАЗАД", save: "ОК", vol: "ГРОМКОСТЬ", lang: "ЯЗЫК", l_theme: "СВЕТЛЫЙ", d_theme: "ТЕМНЫЙ", m_classic: "ХРОМА", m_zen: "ДЗЕН", m_chaos: "ХАОС", m_giant: "ГИГАНТ", m_void: "ПУСТОТА" },
    jp: { play: "プレイ", shop: "コレクション", settings: "設定", modes: "モード", back: "戻る", save: "決定", vol: "音量", lang: "言語", l_theme: "ライト", d_theme: "ダーク", m_classic: "クロマ", m_zen: "禅", m_chaos: "カオス", m_giant: "巨大", m_void: "ボイド" }
};

const SKINS = [
    { id: 0, face: '( •̀ ω •́ )', color: '#FFB7C5', price: 0 },
    { id: 1, face: '(⌐■_■)', color: '#A0E7FF', price: 100 },
    { id: 2, face: '(¬_¬")', color: '#FFD97D', price: 250 },
    { id: 3, face: '(•ˋ _ ˊ•)', color: '#FF7675', price: 500 },
    { id: 4, face: '(╹ڡ╹ )', color: '#B2F2BB', price: 750 },
    { id: 5, face: '(︶^︶)', color: '#D0BFFF', price: 1000 },
    { id: 6, face: '(¬‿¬)', color: '#FAB1A0', price: 1500 },
    { id: 7, face: '(●\'◡\'●)', color: '#55EFC4', price: 2000 },
    { id: 8, face: '/ᐠ｡ꞈ｡ᐟ\\', color: '#81ECEC', price: 3000 },
    { id: 9, face: '( > ω < )', color: '#A29BFE', price: 4500 },
    { id: 10, face: '(´▽｀)', color: '#FFEAA7', price: 6000 },
    { id: 11, face: 'Σ(っ°Д°;)っ', color: 'rainbow', price: 10000 }
];

const game = {
    canvas: document.getElementById('stage'), ctx: null,
    on: false, stars: 0, score: 0, activeSkin: 0, owned: [0],
    player: { x:0, y:0, r:28, vx:0, vy:0, st:1, sq:1, tx:0, ty:0 },
    enemies: [], hue: 0, mode: 'classic',

    init() {
        // Preferir el espacio de color sRGB en canvas si el navegador lo soporta
        try {
            this.ctx = this.canvas.getContext('2d', { colorSpace: 'srgb' }) || this.canvas.getContext('2d');
        } catch (e) {
            this.ctx = this.canvas.getContext('2d');
        }
        audio.init();
        // start with canvas non-interactive until game starts
        if (this.canvas) this.canvas.style.pointerEvents = 'none';
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.setupInput();
        this.loadData();
        ui.setLang(localStorage.getItem('g_lang') || 'en');
        ui.setTheme(localStorage.getItem('g_theme') || 'light-pink');
        this.loop();
        GamePix.loaded();
    },

    loadData() {
        this.stars = parseInt(localStorage.getItem('g_stars') || 0);
        this.owned = JSON.parse(localStorage.getItem('g_owned') || "[0]");
        this.activeSkin = parseInt(localStorage.getItem('g_skin') || 0);
    },

    resize() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const w = window.innerWidth;
        const h = window.innerHeight;
        this.canvas.style.width = w + 'px';
        this.canvas.style.height = h + 'px';
        this.canvas.width = Math.floor(w * dpr);
        this.canvas.height = Math.floor(h * dpr);
        if (this.ctx && typeof this.ctx.setTransform === 'function') {
            this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        } else if (this.ctx && typeof this.ctx.scale === 'function') {
            this.ctx.scale(dpr, dpr);
        }
    },

    setupInput() {
        // Throttle touch/mouse moves to animation frames to improve perf
        let pending = false;
        let lastX = 0, lastY = 0;
        const handleMove = (e) => {
            const p = e.touches ? e.touches[0] : e;
            if(isNaN(p.clientX) || isNaN(p.clientY)) return;
            lastX = p.clientX; lastY = p.clientY;
            if (!pending) {
                pending = true;
                requestAnimationFrame(() => {
                    if(this.on) {
                        this.player.tx = lastX;
                        this.player.ty = lastY;
                    }
                    pending = false;
                });
            }
        };
        window.addEventListener('mousemove', handleMove);
        // Sólo escuchar touchmove en el canvas para no bloquear el scroll de la página
        if (this.canvas && this.canvas.addEventListener) {
            this.canvas.addEventListener('touchmove', handleMove, { passive: false });
        }
    },

    start(m) {
        this.mode = m; this.on = true; this.score = 0; this.enemies = [];
        this.player.x = innerWidth/2; this.player.y = innerHeight/2;
        this.player.tx = this.player.x; this.player.ty = this.player.y;
        this.player.r = (m === 'giant') ? 50 : 28;
        document.getElementById('hud').style.display = 'flex';
        // enable canvas interaction when game is running
        if (this.canvas) this.canvas.style.pointerEvents = 'auto';
        ui.go('none');
    },

    stop() {
        this.on = false; audio.pause();
        GamePix.interstitialAd().then(() => { 
            audio.resume(); ui.go('scr-main'); 
            document.getElementById('hud').style.display = 'none'; 
            if (this.canvas) this.canvas.style.pointerEvents = 'none';
        });
    },

    update() {
        if(!this.on) return;
        this.hue += 1;
        
        // FIX: Suavizado y Clamping para evitar que la Gloop desaparezca si el vx/vy es infinito
        let ease = (this.mode === 'zen') ? 0.08 : (this.mode === 'void' ? 0.25 : 0.15);
        
        let dx = this.player.tx - this.player.x;
        let dy = this.player.ty - this.player.y;
        
        this.player.vx = dx * ease;
        this.player.vy = dy * ease;
        
        this.player.x += this.player.vx;
        this.player.y += this.player.vy;

        // Mantener dentro de pantalla
        const r = this.player.r;
        if(this.player.x < r) this.player.x = r;
        if(this.player.x > innerWidth - r) this.player.x = innerWidth - r;
        if(this.player.y < r) this.player.y = r;
        if(this.player.y > innerHeight - r) this.player.y = innerHeight - r;

        let spd = Math.hypot(this.player.vx, this.player.vy);
        this.player.st = Math.min(1.5, 1 + spd * 0.015);
        this.player.sq = Math.max(0.5, 1 - spd * 0.015);

        if(Math.random() < (this.mode === 'void' ? 0.1 : 0.05)) {
            let isS = Math.random() < 0.15;
            this.enemies.push({
                x: Math.random() * innerWidth, y: -50,
                r: isS ? 15 : 20 + Math.random()*15,
                vy: (this.mode === 'zen' ? 3 : (this.mode === 'void' ? 9 : 5)) + Math.random()*3,
                type: isS ? 'star' : 'danger',
                color: isS ? '#FFD700' : ['#FF8FA3','#38BDF8','#A78BFA','#FACC15','#4ADE80'][Math.floor(Math.random()*5)]
            });
        }

        for(let i=this.enemies.length-1; i>=0; i--) {
            let e = this.enemies[i];
            e.y += e.vy;
            if(this.mode === 'chaos') e.x += Math.sin(e.y * 0.05) * 8;
            
            let d = Math.hypot(this.player.x - e.x, this.player.y - e.y);
            if(d < (this.player.r + e.r) * 0.85) {
                if(e.type === 'star') { 
                    this.stars++; this.enemies.splice(i,1); 
                    localStorage.setItem('g_stars', this.stars);
                } else this.stop();
            } else if(e.y > innerHeight + 100) this.enemies.splice(i,1);
        }
        this.score += (this.mode === 'void' ? 2 : 1);
        // Update displayed score/stars only when changed to reduce DOM thrash
        if (!this._lastDisplayed) this._lastDisplayed = { score: -1, stars: -1 };
        const displayScore = Math.floor(this.score);
        if (displayScore !== this._lastDisplayed.score) {
            this._lastDisplayed.score = displayScore;
            document.getElementById('val-score').innerText = displayScore;
        }
        if (this.stars !== this._lastDisplayed.stars) {
            this._lastDisplayed.stars = this.stars;
            document.getElementById('val-stars').innerText = this.stars;
        }
    },

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0,0,innerWidth,innerHeight);
        if(!this.on) return;

        this.enemies.forEach(e => {
            if(e.type === 'star') {
                ctx.font = "24px Arial"; ctx.fillText("⭐", e.x-12, e.y+10);
            } else {
                ctx.fillStyle = e.color; ctx.beginPath();
                ctx.roundRect(e.x-e.r, e.y-e.r, e.r*2, e.r*2, 12); ctx.fill();
            }
        });

        const s = SKINS[this.activeSkin];
        let c = s.color === 'rainbow' ? `hsl(${this.hue}, 80%, 60%)` : s.color;
        ctx.save();
        ctx.translate(this.player.x, this.player.y);
        ctx.rotate(Math.atan2(this.player.vy, this.player.vx));
        ctx.fillStyle = c; ctx.beginPath();
        ctx.ellipse(0, 0, this.player.r * this.player.st, this.player.r * this.player.sq, 0, 0, Math.PI*2);
        ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
        ctx.restore();
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.textAlign = "center"; ctx.font = "900 16px Outfit";
        ctx.fillText(s.face, this.player.x, this.player.y + 6);
    },

    loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
};

const ui = {
    go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id !== 'none') document.getElementById(id).classList.add('active');
        if(id === 'scr-shop') this.renderShop();
    },
    toggleSub(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('active');
        document.querySelectorAll('.theme-group').forEach(g => g.classList.remove('active'));
        if(!isOpen) el.classList.add('active');
    },
    setLang(l) {
        localStorage.setItem('g_lang', l);
        const t = TRANSLATIONS[l];
        document.getElementById('txt-play').innerText = t.play;
        document.getElementById('txt-shop-btn').innerText = t.shop;
        document.getElementById('txt-settings-btn').innerText = t.settings;
        document.getElementById('txt-modes-title').innerText = t.modes;
        document.getElementById('txt-back-1').innerText = t.back;
        document.getElementById('txt-back-2').innerText = t.back;
        document.getElementById('txt-settings-title').innerText = t.settings;
        document.getElementById('txt-vol-label').innerText = t.vol;
        document.getElementById('txt-theme-light').innerText = t.l_theme;
        document.getElementById('txt-theme-dark').innerText = t.d_theme;
        document.getElementById('txt-lang-label').innerText = t.lang;
        document.getElementById('txt-save-btn').innerText = t.save;
        document.getElementById('txt-shop-title').innerText = t.shop;
        document.getElementById('txt-mode-classic').innerText = t.m_classic;
        document.getElementById('txt-mode-zen').innerText = t.m_zen;
        document.getElementById('txt-mode-chaos').innerText = t.m_chaos;
        document.getElementById('txt-mode-giant').innerText = t.m_giant;
        document.getElementById('txt-mode-void').innerText = t.m_void;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText === l.toUpperCase()));
    },
    setTheme(t) {
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('g_theme', t);
    },
    renderShop() {
        document.getElementById('shop-stars').innerText = game.stars;
        const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
        SKINS.forEach((s, idx) => {
            const owned = game.owned.includes(s.id);
            const div = document.createElement('div');
            div.className = `skin-item ${game.activeSkin === s.id ? 'selected' : ''} ${!owned ? 'locked' : ''} anim-init`;
            div.style.background = s.color === 'rainbow' ? 'linear-gradient(45deg, #FF4D6D, #0EA5E9, #22C55E)' : s.color;
            div.innerHTML = `<div style="font-size:1.2rem; margin-bottom:5px;">${s.face}</div><div style="font-size:0.7rem; font-weight:900;">${owned ? 'OK' : '⭐'+s.price}</div>`;
            div.onclick = () => {
                if(owned) {
                    game.activeSkin = s.id;
                } else if(game.stars >= s.price) {
                    game.stars -= s.price;
                    game.owned.push(s.id);
                    game.activeSkin = s.id;
                }
                localStorage.setItem('g_owned', JSON.stringify(game.owned)); 
                localStorage.setItem('g_skin', game.activeSkin); 
                localStorage.setItem('g_stars', game.stars);
                this.renderShop();
            };
            grid.appendChild(div);
            // Animación escalonada de entrada
            window.setTimeout(() => {
                div.classList.remove('anim-init');
                div.classList.add('anim-show');
            }, idx * 60);
        });
    }
};

game.init();
</script>
</body>
</html>
